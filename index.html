    <!-- TPHQ Analytics \u2014 Event-level tracking via Supabase -->
    <script>
    (function(){
      'use strict';
      var SU='https://ycgyfukhxxtitrbkotpj.supabase.co';
      var SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InljZ3lmdWtoeHh0aXRyYmtvdHBqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxNzcyOTEsImV4cCI6MjA4OTc1MzI5MX0.3oe0JiWrSOF7NDhT8EQswBaQR1Qn1x_q9vrnYaN0Y6s';
      var H={'Content-Type':'application/json','apikey':SK,'Authorization':'Bearer '+SK,'Prefer':'return=minimal'};
      var sid=sessionStorage.getItem('tphq_sid');
      if(!sid){sid=Math.random().toString(36).substring(2)+Date.now().toString(36);sessionStorage.setItem('tphq_sid',sid);}
      function post(data){data.session_id=sid;fetch(SU+'/rest/v1/analytics_events',{method:'POST',headers:H,body:JSON.stringify(data),keepalive:true}).catch(function(){});}
      function gp(){var h=location.hash||'#/';return h.replace(/^#/,'')||'/';}
      var lp='';
      function tv(){var p=gp();if(p===lp)return;lp=p;post({event_type:'page_view',page:p,metadata:{referrer:document.referrer||null,screen_width:window.innerWidth,search:location.search||''}});}
      tv();
      window.addEventListener('hashchange',function(){tv();});
      window.tphqTrack=function(t,meta){post({event_type:t,page:gp(),metadata:meta||{}});};
      document.addEventListener('click',function(e){
        var el=e.target.closest('a,button,[data-track],[role="button"]');
        if(!el)return;
        if(el.dataset.track){window.tphqTrack(el.dataset.track,{label:el.dataset.trackLabel||el.textContent.trim().substring(0,80),category:el.dataset.trackCategory||'interaction'});return;}
        if(el.tagName==='BUTTON'||el.role==='button'||el.classList.contains('cta')||el.classList.contains('btn')){var t=el.textContent.trim().substring(0,80);if(t)window.tphqTrack('button_click',{label:t,category:'cta'});}
        if(el.tagName==='A'&&el.href){
          if(el.hostname!==location.hostname)window.tphqTrack('outbound_click',{label:el.href,category:'link'});
          var hr=el.getAttribute('href')||'';
          if(hr.includes('#/toolkit/'))window.tphqTrack('tool_open',{label:hr.split('#/toolkit/')[1],category:'toolkit'});
          if(hr.includes('#/events'))window.tphqTrack('events_page',{label:'events',category:'navigation'});
        }
        if(el.closest('[onclick*="Calendly"],[data-url*="calendly"]')||(el.textContent&&el.textContent.toLowerCase().includes('consultation')))window.tphqTrack('calendly_open',{label:el.textContent.trim().substring(0,80),category:'conversion'});
      });
      document.addEventListener('mousedown',function(e){if(e.target.closest('.leaflet-container'))window.tphqTrack('map_interaction',{category:'map'});});
      document.addEventListener('submit',function(e){window.tphqTrack('form_submit',{label:e.target.id||'unknown',category:'conversion'});});
      var sm={};window.addEventListener('scroll',function(){var p=Math.round(100*(window.scrollY+window.innerHeight)/document.body.scrollHeight);[25,50,75,100].forEach(function(m){if(p>=m&&!sm[gp()+m]){sm[gp()+m]=true;window.tphqTrack('scroll_depth',{label:m+'%',value:m,category:'engagement'});}});},{passive:true});
    })();
    </script>
  </body>
